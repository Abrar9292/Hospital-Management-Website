<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Appointment - MediCare Plus</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="preloader">
        <div class="loader"></div>
    </div>

    <div id="toastBox"></div>

    <button id="themeToggle" class="theme-toggle">
        <i class="fa-solid fa-moon"></i>
    </button>

    <button id="backToTop" class="back-top-btn">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <nav class="navbar navbar-expand-lg fixed-top medical-navbar">

        <div class="container">

            <a class="navbar-brand medical-logo" href="index.html">

                <i class="fa-solid fa-heart-pulse"></i>
                MediCare Plus

            </a>

            <button class="navbar-toggler menu-btn" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <i class="fa-solid fa-bars"></i>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav mx-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">

                            Home

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="doctors.html">

                            Doctors

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="appointment.html">

                            Appointment

                        </a>
                    </li>

                </ul>

                <a href="appointment.html" class="medical-btn">

                    Book Appointment

                </a>

            </div>

        </div>

    </nav>

    <section class="page-hero">

        <div class="container text-center">

            <span class="hero-tag">
                Book Consultation
            </span>

            <h1>
                Schedule Your Appointment
            </h1>

            <p>
                Quick and easy online appointment booking with specialists.
            </p>

        </div>

    </section>

    <section class="appointment-section">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <div class="appointment-form-box">

                        <h2>
                            Book Appointment
                        </h2>

                        <form id="appointmentForm">

                            <div class="row">

                                <div class="col-md-6 mb-4">

                                    <input type="text" class="form-control medical-input" placeholder="Full Name"
                                        required>

                                </div>

                                <div class="col-md-6 mb-4">

                                    <input type="email" class="form-control medical-input" placeholder="Email Address"
                                        required>

                                </div>

                            </div>

                            <div class="row">

                                <div class="col-md-6 mb-4">

                                    <input type="text" class="form-control medical-input" placeholder="Phone Number"
                                        required>

                                </div>

                                <div class="col-md-6 mb-4">

                                    <select class="form-control medical-input">

                                        <option>Select Department</option>
                                        <option>Cardiology</option>
                                        <option>Neurology</option>
                                        <option>Surgery</option>
                                        <option>Diagnostics</option>

                                    </select>

                                </div>

                            </div>

                            <div class="mb-4">

                                <textarea rows="6" class="form-control medical-input"
                                    placeholder="Describe Your Problem"></textarea>

                            </div>

                            <button type="submit" class="medical-submit-btn">

                                Confirm Appointment

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <footer class="medical-footer">

        <div class="container text-center">

            <h3>
                <i class="fa-solid fa-heart-pulse"></i>
                MediCare Plus
            </h3>

            <p>
                Premium healthcare services for modern life.
            </p>

            <p>
                © 2026 MediCare Plus. All Rights Reserved.
            </p>

        </div>

    </footer>

    <script src="script.js"></script>

</body>

</html>
